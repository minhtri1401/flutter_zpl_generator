name: flutter_zpl_generator
description: A comprehensive Flutter package for generating ZPL (Zebra Programming Language) labels with Labelary API integration and live preview capabilities.
version: 1.3.0
homepage: https://github.com/minhtri1401/flutter_zpl_generator
repository: https://github.com/minhtri1401/flutter_zpl_generator
issue_tracker: https://github.com/minhtri1401/flutter_zpl_generator/issues

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  image: ^4.8.0
  http: ^1.6.0
  hex: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  build_runner: ^2.13.1

# This package does not require any Flutter-specific configuration
flutter:
  # This package contains widgets that can be used in Flutter apps
  uses-material-design: false

topics:
  - zpl
  - labels
  - printing
  - zebra
  - barcode

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows: